name: Auto LeetCode Sync
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"   # runs every 10 minutes

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow commits

    # Prevent overlapping runs from racing on the same commit/state file
    concurrency:
      group: leetcode-sync
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: |
          python scripts/sync_leetcode.py
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-sync LeetCode solutions" || echo "No changes"
          git pull --rebase origin main || true
          git push
